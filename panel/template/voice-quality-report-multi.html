<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Quality Report — netwatcher.io</title>
<style>
  :root {
    --nw-primary: #3b82f6;
    --nw-secondary: #10b981;
    --nw-purple: #8b5cf6;
    --nw-dark: #0a0e17;
    --nw-slate-900: #111827;
    --nw-slate-700: #334155;
    --nw-slate-500: #64748b;
    --nw-slate-400: #94a3b8;
    --nw-slate-100: #f0f4f8;
    --nw-success: #22c55e;
    --nw-warning: #f59e0b;
    --nw-danger: #ef4444;
    --nw-gradient: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
    --page-w: 8.5in;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--nw-slate-900);
    background: #e2e8f0;
    font-size: 10pt;
    line-height: 1.45;
  }
  .mono { font-family: "SF Mono", "Cascadia Mono", Consolas, Menlo, monospace; }

  .page {
    width: var(--page-w);
    min-height: 11in;
    margin: 0.35in auto;
    background: #fff;
    padding: 0.5in 0.55in;
    box-shadow: 0 2px 14px rgba(10,14,23,.18);
    display: flex; flex-direction: column;
  }
  .toolbar { max-width: var(--page-w); margin: 14px auto 0; text-align: right; }
  .toolbar button {
    background: var(--nw-gradient); color: #fff; border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  @media print {
    body { background: #fff; font-size: 9.5pt; }
    .toolbar { display: none; }
    .page { width: auto; min-height: 0; margin: 0; padding: 0; box-shadow: none; page-break-after: always; }
    .page:last-child { page-break-after: auto; }
    @page { size: letter; margin: 0.5in 0.55in; }
  }

  /* Header */
  .report-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, #3b82f6, #10b981) 1;
    padding-bottom: 12px; margin-bottom: 16px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 8px; background: var(--nw-gradient);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-name { font-size: 15pt; font-weight: 700; letter-spacing: -.02em; }
  .brand-name .tld { color: var(--nw-primary); }
  .brand-sub { font-size: 7.5pt; color: var(--nw-slate-500); text-transform: uppercase; letter-spacing: .12em; }
  .report-title { text-align: right; }
  .report-title h1 { font-size: 14pt; font-weight: 700; }
  .report-title .rid { font-size: 8pt; color: var(--nw-slate-500); }

  .mini-header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 2px solid var(--nw-slate-100);
    padding-bottom: 6px; margin-bottom: 14px;
    font-size: 8pt; color: var(--nw-slate-500);
  }
  .mini-header b { color: var(--nw-slate-900); font-size: 9.5pt; }

  /* Meta */
  .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .meta-cell { background: var(--nw-slate-100); border-radius: 6px; padding: 7px 10px; }
  .meta-cell .k { font-size: 6.8pt; text-transform: uppercase; letter-spacing: .08em; color: var(--nw-slate-500); }
  .meta-cell .v { font-size: 9pt; font-weight: 600; word-break: break-word; }

  /* Verdict */
  .verdict {
    display: flex; align-items: center; gap: 18px;
    border-radius: 10px; padding: 14px 18px; margin-bottom: 16px;
    color: #fff; background: var(--nw-dark);
  }
  .mos-ring { position: relative; width: 86px; height: 86px; flex: none; }
  .mos-ring svg { width: 86px; height: 86px; transform: rotate(-90deg); }
  .mos-ring .val { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .mos-ring .val b { font-size: 15pt; line-height: 1; }
  .mos-ring .val span { font-size: 6.4pt; opacity: .75; text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }
  .verdict-body { flex: 1; }
  .verdict-body h2 { font-size: 12pt; margin-bottom: 2px; }
  .verdict-body p { font-size: 8.5pt; opacity: .85; max-width: 46em; }
  .grade-chip {
    flex: none; text-align: center; border-radius: 8px; padding: 8px 16px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
  }
  .grade-chip b { font-size: 17pt; display: block; line-height: 1.1; }
  .grade-chip span { font-size: 6.6pt; text-transform: uppercase; letter-spacing: .1em; opacity: .7; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .kpi { border: 1px solid #e2e8f0; border-radius: 8px; padding: 9px 12px 8px; border-top: 3px solid var(--nw-slate-400); }
  .kpi.ok { border-top-color: var(--nw-success); }
  .kpi.warn { border-top-color: var(--nw-warning); }
  .kpi.crit { border-top-color: var(--nw-danger); }
  .kpi .label { font-size: 7.2pt; text-transform: uppercase; letter-spacing: .08em; color: var(--nw-slate-500); display: flex; justify-content: space-between; }
  .kpi .value { font-size: 14pt; font-weight: 700; letter-spacing: -.02em; }
  .kpi .value small { font-size: 8.5pt; font-weight: 600; color: var(--nw-slate-500); }
  .kpi .sub { font-size: 7.4pt; color: var(--nw-slate-500); }
  .badge {
    display: inline-block; font-size: 6.6pt; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; border-radius: 20px; padding: 1.5px 8px; color: #fff;
  }
  .badge.ok { background: var(--nw-success); }
  .badge.warn { background: var(--nw-warning); }
  .badge.crit { background: var(--nw-danger); }
  .badge.na { background: var(--nw-slate-400); }

  /* Sections */
  .section { margin-bottom: 15px; }
  .section-title { display: flex; align-items: center; gap: 8px; font-size: 10.5pt; font-weight: 700; margin-bottom: 8px; }
  .section-title::before { content: ""; width: 4px; height: 14px; border-radius: 2px; background: var(--nw-gradient); }
  .section-note { font-size: 7.6pt; color: var(--nw-slate-500); margin-top: 5px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 8.2pt; }
  thead th {
    background: var(--nw-slate-900); color: #fff; text-align: left;
    font-size: 6.8pt; text-transform: uppercase; letter-spacing: .06em;
    padding: 5.5px 7px; font-weight: 600;
  }
  thead th.num, td.num { text-align: right; }
  tbody td { padding: 5px 7px; border-bottom: 1px solid #eef2f7; }
  tbody tr:nth-child(even) td { background: #f8fafc; }
  td .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
  .dot-ok { background: var(--nw-success); } .dot-warn { background: var(--nw-warning); } .dot-crit { background: var(--nw-danger); }
  tr.row-warn td { background: #fffbeb !important; }
  tr.row-crit td { background: #fef2f2 !important; }
  tr.group-row td {
    background: var(--nw-slate-100) !important; font-weight: 700; font-size: 7.4pt;
    text-transform: uppercase; letter-spacing: .06em; color: var(--nw-slate-700);
    border-bottom: 1px solid #dbe4ee;
  }
  .dir-arrow { font-weight: 700; color: var(--nw-primary); }
  .dir-arrow.rev { color: var(--nw-purple); }

  /* Charts */
  .chart-box { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px 6px; }
  .chart-head { display: flex; justify-content: space-between; font-size: 7.6pt; color: var(--nw-slate-500); margin-bottom: 4px; }
  .chart-head b { color: var(--nw-slate-900); font-size: 8.4pt; }
  .legend { display: flex; gap: 12px; }
  .legend i { display: inline-block; width: 10px; height: 3px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

  .bar-track { background: #eef2f7; border-radius: 3px; height: 8px; width: 54px; display: inline-block; vertical-align: middle; }
  .bar-fill { height: 8px; border-radius: 3px; display: block; }

  .threshold-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .threshold-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 7.8pt; }
  .threshold-card b { display: block; font-size: 8.4pt; margin-bottom: 3px; }
  .threshold-card .rng { display: flex; justify-content: space-between; padding: 1.5px 0; color: var(--nw-slate-700); }

  .page-footer {
    margin-top: auto; padding-top: 10px; border-top: 1px solid #e2e8f0;
    display: flex; justify-content: space-between;
    font-size: 7pt; color: var(--nw-slate-400);
  }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* target banner on detail pages */
  .target-banner {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--nw-slate-100); border-left: 4px solid var(--nw-primary);
    border-radius: 6px; padding: 8px 12px; margin-bottom: 14px;
  }
  .target-banner .t-name { font-weight: 700; font-size: 10.5pt; }
  .target-banner .t-sub { font-size: 7.6pt; color: var(--nw-slate-500); }
  .target-banner .t-mos { text-align: right; }
  .target-banner .t-mos b { font-size: 13pt; }
  .target-banner .t-mos span { display: block; font-size: 6.6pt; color: var(--nw-slate-500); text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>

/* ===================== helpers ===================== */
const T = REPORT_DATA.thresholds;
const STATUS_LABEL = { ok: "Pass", warn: "Degraded", crit: "Fail" };
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");

function statusFor(v, warnAt, critAt) { return v >= critAt ? "crit" : v >= warnAt ? "warn" : "ok"; }
function mosStatus(mos) { return mos >= 4.0 ? "ok" : mos >= 3.6 ? "warn" : "crit"; }
function mosColor(mos)  { return mos >= 4.0 ? "#22c55e" : mos >= 3.6 ? "#f59e0b" : "#ef4444"; }
function worstStatus(list) { return list.includes("crit") ? "crit" : list.includes("warn") ? "warn" : "ok"; }
function fmtDate(iso) { return new Date(iso).toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short", timeZone: "UTC" }) + " UTC"; }

function dirStatus(d) {
  return worstStatus([
    statusFor(d.latency.avg, T.latencyMs * 0.66, T.latencyMs),
    statusFor(d.jitter.max,  T.jitterMs * 0.66,  T.jitterMs),
    statusFor(d.packets.lossPct, T.lossPct * 0.5, T.lossPct),
    statusFor(d.packets.dupPct,  T.dupPct,  T.dupPct * 5),
    statusFor(d.packets.oooPct,  T.oooPct,  T.oooPct * 4),
    mosStatus(d.mos)
  ]);
}

/* ---------- shared SVG chart builders (print-safe, no libs) ---------- */
function lineChartSVG(series, opts) {
  const W = 660, H = opts.height || 130, PL = 34, PB = 16, PT = 6, PR = 6;
  const iw = W - PL - PR, ih = H - PT - PB;
  const all = series.flatMap(s => s.data).concat(opts.hline ? [opts.hline] : []);
  const yMax = Math.ceil(Math.max(...all) * 1.15 / 10) * 10 || 10;
  const n = Math.max(...series.map(s => s.data.length));
  const x = i => PL + (i / (n - 1)) * iw;
  const y = v => PT + ih - (v / yMax) * ih;
  let g = "";
  for (let t = 0; t <= 4; t++) {
    const v = (yMax / 4) * t, yy = y(v);
    g += `<line x1="${PL}" y1="${yy}" x2="${W - PR}" y2="${yy}" stroke="#eef2f7"/>` +
         `<text x="${PL - 5}" y="${yy + 3}" font-size="7" fill="#94a3b8" text-anchor="end">${v}</text>`;
  }
  const dur = opts.durationSec || n;
  [0, .25, .5, .75, 1].forEach(f => {
    const sec = Math.round(dur * f), mm = String(Math.floor(sec / 60)).padStart(2, "0"), ss = String(sec % 60).padStart(2, "0");
    g += `<text x="${PL + iw * f}" y="${H - 3}" font-size="7" fill="#94a3b8" text-anchor="middle">${mm}:${ss}</text>`;
  });
  if (opts.hline) g += `<line x1="${PL}" y1="${y(opts.hline)}" x2="${W - PR}" y2="${y(opts.hline)}" stroke="#ef4444" stroke-dasharray="4 3"/>`;
  series.forEach(s => {
    const pts = s.data.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    if (s.fill) g += `<polygon points="${PL},${y(0)} ${pts} ${x(s.data.length - 1)},${y(0)}" fill="${s.color}" opacity="0.08"/>`;
    g += `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="1.6" stroke-linejoin="round" ${s.dash ? `stroke-dasharray="${s.dash}"` : ""}/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">${g}</svg>`;
}

function barChartSVG(data, opts) {
  const W = 660, H = opts.height || 130, PL = 34, PB = 30, PT = 8, PR = 6;
  const iw = W - PL - PR, ih = H - PT - PB;
  const yMax = (opts.yMax || Math.max(...data.map(d => d.v)) * 1.2) || 1;
  const bw = Math.min(38, iw / data.length * 0.6);
  let g = "";
  for (let t = 0; t <= 3; t++) {
    const v = (yMax / 3) * t, yy = PT + ih - (v / yMax) * ih;
    g += `<line x1="${PL}" y1="${yy}" x2="${W - PR}" y2="${yy}" stroke="#eef2f7"/>` +
         `<text x="${PL - 5}" y="${yy + 3}" font-size="7" fill="#94a3b8" text-anchor="end">${v.toFixed(opts.dec ?? 0)}</text>`;
  }
  data.forEach((d, i) => {
    const cx = PL + (i + 0.5) * (iw / data.length);
    const h = Math.max(0, (d.v / yMax) * ih);
    g += `<rect x="${cx - bw / 2}" y="${PT + ih - h}" width="${bw}" height="${h}" rx="2" fill="${d.color || '#3b82f6'}"/>` +
         `<text x="${cx}" y="${PT + ih - h - 3}" font-size="6.6" fill="#334155" text-anchor="middle">${d.v.toFixed(opts.valDec ?? 1)}</text>`;
    const lines = String(d.label).split("\n");
    lines.forEach((ln, li) => {
      g += `<text x="${cx}" y="${PT + ih + 9 + li * 8}" font-size="6.4" fill="#64748b" text-anchor="middle">${esc(ln)}</text>`;
    });
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">${g}</svg>`;
}

function mosRing(mos, size) {
  const r = 37, C = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, (mos - 1) / 4));
  return `
    <div class="mos-ring">
      <svg viewBox="0 0 86 86">
        <circle cx="43" cy="43" r="${r}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="7"/>
        <circle cx="43" cy="43" r="${r}" fill="none" stroke="${mosColor(mos)}" stroke-width="7" stroke-linecap="round"
                stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C * (1 - pct)).toFixed(1)}"/>
      </svg>
      <div class="val"><b>${mos.toFixed(2)}</b><span>MOS</span></div>
    </div>`;
}

function dirLabel(pair, dir) {
  return dir === "forward"
    ? `<span class="dir-arrow">→</span> ${esc(pair.agent.name)} → ${esc(pair.target.host)}`
    : `<span class="dir-arrow rev">←</span> ${esc(pair.target.host)} → ${esc(pair.agent.name)}`;
}

/* ---------- overview page ---------- */
function overviewPage() {
  const M = REPORT_DATA.meta;
  const dirs = [];
  REPORT_DATA.pairs.forEach(p => {
    ["forward", "reverse"].forEach(k => { if (p.directions[k]) dirs.push({ pair: p, key: k, d: p.directions[k] }); });
  });
  const avgMos = dirs.reduce((a, x) => a + x.d.mos, 0) / dirs.length;
  const worst = dirs.reduce((a, x) => x.d.mos < a.d.mos ? x : a, dirs[0]);
  const counts = { ok: 0, warn: 0, crit: 0 };
  dirs.forEach(x => counts[dirStatus(x.d)]++);
  const overall = worstStatus(dirs.map(x => dirStatus(x.d)));
  const verdictTitle = overall === "ok" ? "All monitored paths within voice-quality targets"
    : overall === "warn" ? "Voice quality acceptable — one or more paths degraded"
    : "Voice quality impaired on one or more paths";
  const verdictText = `Across ${REPORT_DATA.pairs.length} probe/target pairs (${dirs.length} directional streams), mean MOS is ${avgMos.toFixed(2)}. ` +
    `${counts.ok} stream(s) pass, ${counts.warn} degraded, ${counts.crit} failing. Worst stream: ` +
    `${worst.pair.target.name} (${worst.key}) at MOS ${worst.d.mos.toFixed(2)}.`;

  const meta = [
    ["Test Window", M.window],
    ["Simulation Profile", M.profile],
    ["Streams Measured", `${dirs.length} (across ${REPORT_DATA.pairs.length} pairs)`],
    ["Per-Stream Volume", `${M.packetsPerStream.toLocaleString()} pkts / ${M.duration}`]
  ].map(([k, v]) => `<div class="meta-cell"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`).join("");

  const rows = REPORT_DATA.pairs.map(p => {
    const inner = ["forward", "reverse"].map(k => {

    <div class="target-banner">
      <div>
        <div class="t-name">${idx + 1}. ${esc(p.target.name)} <span class="mono" style="font-weight:400;font-size:8pt;color:var(--nw-slate-500)">${esc(p.target.host)} (${esc(p.target.ip)}):${p.target.port}/udp</span></div>
        <div class="t-sub">Probe: ${esc(p.agent.name)} — ${esc(p.agent.location)}${p.target.agent ? ` · Return agent: ${esc(p.target.agent)}` : " · No return agent (forward only)"}</div>
      </div>
      <div style="display:flex;gap:18px">
        ${dirs.map(k => {
          const d = p.directions[k];
          return `<div class="t-mos"><b style="color:${mosColor(d.mos)}">${d.mos.toFixed(2)}</b><span>MOS ${k === "forward" ? "fwd →" : "← rev"}</span></div>`;
        }).join("")}
      </div>
    </div>`;

  const statRows = dirs.map(k => {
    const d = p.directions[k];
    const mk = (name, s, thr, st) => `
      <tr class="${st === 'ok' ? '' : 'row-' + st}">
        <td>${name}</td>
        <td class="num mono">${s.min.toFixed(1)}</td>
        <td class="num mono"><b>${s.avg.toFixed(1)}</b></td>
        <td class="num mono">${s.max.toFixed(1)}</td>
        <td class="num mono">${s.stddev.toFixed(1)}</td>
        <td class="num mono">${thr}</td>
        <td><span class="status-dot dot-${st}"></span>${STATUS_LABEL[st]}</td>
      </tr>`;
    return `
      <tr class="group-row"><td colspan="7">${dirLabel(p, k)}</td></tr>
      ${mk("Latency (RTT)", d.latency, T.latencyMs + " ms", statusFor(d.latency.avg, T.latencyMs * 0.66, T.latencyMs))}
      ${mk("Interarrival jitter (RFC 3550)", d.jitter, T.jitterMs + " ms", statusFor(d.jitter.max, T.jitterMs * 0.66, T.jitterMs))}`;
  }).join("");

  const pktRows = dirs.map(k => {
    const d = p.directions[k], pk = d.packets;
    const row = (name, count, pct, st) => `
      <tr>
        <td>${name}</td>
        <td class="num mono">${count.toLocaleString()}</td>
        <td class="num mono">${pct.toFixed(2)}%</td>
        <td><span class="status-dot dot-${st}"></span>${STATUS_LABEL[st]}</td>
      </tr>`;
    return `
      <tr class="group-row"><td colspan="4">${dirLabel(p, k)} — ${pk.received.toLocaleString()} / ${pk.sent.toLocaleString()} received</td></tr>
      ${row("Lost", pk.lost, pk.lossPct, statusFor(pk.lossPct, T.lossPct * 0.5, T.lossPct))}
      ${row("Duplicates", pk.duplicates, pk.dupPct, statusFor(pk.dupPct, T.dupPct, T.dupPct * 5))}
      ${row("Out-of-order", pk.outOfOrder, pk.oooPct, statusFor(pk.oooPct, T.oooPct, T.oooPct * 4))}
      ${row("Jitter-buffer discards", pk.discards, pk.discardPct, statusFor(pk.discardPct, 0.5, 2))}`;
  }).join("");

  const rttSeries = [], jitSeries = [];
  if (p.directions.forward) {
    rttSeries.push({ data: p.directions.forward.timeseries.rtt, color: "#3b82f6", fill: true });
    jitSeries.push({ data: p.directions.forward.timeseries.jitter, color: "#3b82f6" });
  }
  if (p.directions.reverse) {
    rttSeries.push({ data: p.directions.reverse.timeseries.rtt, color: "#8b5cf6", dash: "5 3" });
    jitSeries.push({ data: p.directions.reverse.timeseries.jitter, color: "#8b5cf6", dash: "5 3" });
  }
  const maxRtt = Math.max(...rttSeries.flatMap(s => s.data));
  const legend = `
    <div class="legend">
      <span><i style="background:#3b82f6"></i>forward →</span>
      ${p.directions.reverse ? '<span><i style="background:#8b5cf6"></i>← reverse</span>' : ""}
    </div>`;

  return `
  <div class="page">
    ${miniHeader("Target Detail — " + p.target.name)}
    ${banner}
    <div class="section">
      <div class="section-title">Delay &amp; Jitter — Both Directions</div>
      <table>
        <thead><tr><th>Metric</th><th class="num">Min</th><th class="num">Avg</th><th class="num">Max</th><th class="num">Std Dev</th><th class="num">Threshold</th><th>Status</th></tr></thead>
        <tbody>${statRows}</tbody>
      </table>
    </div>
    <div class="section">
      <div class="section-title">Packet Delivery — Both Directions</div>
      <table>
        <thead><tr><th>Counter</th><th class="num">Count</th><th class="num">% of Sent</th><th>Status</th></tr></thead>
        <tbody>${pktRows}</tbody>
      </table>
    </div>
    <div class="section">
      <div class="section-title">Latency &amp; Jitter Over Test Duration</div>
      <div class="chart-box">
        <div class="chart-head"><b>Round-trip time (ms)</b>${legend}</div>
        ${lineChartSVG(rttSeries, { durationSec: 120, height: 128, hline: T.latencyMs <= maxRtt * 1.4 ? T.latencyMs : null })}
      </div>
      <div class="chart-box" style="margin-top:10px">
        <div class="chart-head"><b>Interarrival jitter (ms)</b>${legend}</div>
        ${lineChartSVG(jitSeries, { durationSec: 120, height: 110 })}
      </div>
    </div>
    ${footer()}
  </div>`;
}

/* ---------- per-pair path page ---------- */
function pairPathPage(p, idx) {
  const dirs = ["forward", "reverse"].filter(k => p.directions[k] && p.directions[k].traceroute);
  const sections = dirs.map(k => {
    const tr = p.directions[k].traceroute;
    const maxAvg = Math.max(...tr.hops.map(h => h.avg)) || 1;
    const rows = tr.hops.map(h => {
      const unreachable = h.loss >= 100;
      const st = unreachable ? "warn" : h.loss >= 5 ? "crit" : h.loss > 0 ? "warn" : "ok";
      const barColor = st === "ok" ? "#10b981" : st === "warn" ? "#f59e0b" : "#ef4444";
      const num = v => unreachable ? "—" : v.toFixed(1);
      return `<tr class="${st === 'ok' ? '' : 'row-' + st}">
        <td class="mono">${h.hop}</td>
        <td class="mono">${esc(h.host)}</td>
        <td class="mono" style="color:var(--nw-slate-500)">${esc(h.ip)}${h.asn !== "—" ? " · " + esc(h.asn) : ""}</td>
        <td class="num mono">${h.loss.toFixed(1)}%</td>
        <td><span class="bar-track"><span class="bar-fill" style="width:${Math.min(100, (h.avg / maxAvg) * 100)}%;background:${barColor}"></span></span></td>
        <td class="num mono">${h.sent}</td>
        <td class="num mono">${num(h.last)}</td>
        <td class="num mono"><b>${num(h.avg)}</b></td>
        <td class="num mono">${num(h.best)}</td>
        <td class="num mono">${num(h.worst)}</td>
        <td class="num mono">${num(h.stdev)}</td>
      </tr>`;
    }).join("");
    return `
      <div class="section">
        <div class="section-title">Path ${dirLabel(p, k)}</div>
        <table>
          <thead><tr>
            <th style="width:24px">#</th><th>Host</th><th>IP / ASN</th>
            <th class="num">Loss</th><th style="width:58px"></th><th class="num">Sent</th>
            <th class="num">Last</th><th class="num">Avg</th><th class="num">Best</th><th class="num">Worst</th><th class="num">StDev</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="section-note">${esc(tr.protocol)} — ${esc(tr.note)}</div>
      </div>`;
  }).join("");

  const fwdTr = p.directions.forward && p.directions.forward.traceroute;
  const hopChart = fwdTr ? `
    <div class="section">
      <div class="section-title">Per-Hop Average Latency — forward path (ms)</div>
      <div class="chart-box">${barChartSVG(
        fwdTr.hops.filter(h => h.loss < 100).map(h => ({
          label: "hop " + h.hop, v: h.avg,
          color: h.loss >= 5 ? "#ef4444" : h.loss > 0 ? "#f59e0b" : "#3b82f6"
        })), { height: 126 })}
      </div>
    </div>` : "";

  return `
  <div class="page">
    ${miniHeader("Path Analysis (MTR) — " + p.target.name)}
    ${sections}
    ${hopChart}
    ${footer()}
  </div>`;
}

/* ---------- assemble ---------- */
(function render() {
  let html = overviewPage();
  REPORT_DATA.pairs.forEach((p, i) => {
    html += pairMetricsPage(p, i);
    html += pairPathPage(p, i);
  });
  document.getElementById("report-root").innerHTML = html;
  const pages = document.querySelectorAll(".page");
  pages.forEach((pg, i) => {
    const n = pg.querySelector(".pageno");
    if (n) n.textContent = `Page ${i + 1} of ${pages.length}`;
  });
})();
</script>
</body>
</html>
